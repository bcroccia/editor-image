name: Build and Deploy Editor Image

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./image-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/editor-image:latest
          no-cache: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

            IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/editor-image:latest"
            SERVICE_NAME="editor-image_editor-image"

            docker pull $IMAGE_NAME

            if docker service ls --format '{{.Name}}' | grep -q "^${SERVICE_NAME}$"; then
              docker service update --image $IMAGE_NAME --with-registry-auth $SERVICE_NAME
            else
              cd /root/services/editor-image
              docker stack deploy -c docker-compose.production.yml editor-image --with-registry-auth
            fi

            docker image prune -f
